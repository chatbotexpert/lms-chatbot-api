version: "3.9"

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  lms-postgres:
    image: pgvector/pgvector:pg16
    container_name: lms-postgres
    restart: always
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: HashTurn@0900
      POSTGRES_DB: lms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # DB hidden — only accessible inside Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI App ────────────────────────────────────────────────────────────
  lms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-api
    restart: always
    # No public port — Nginx is the only entry point
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DB_HOST: lms-postgres
      DB_PORT: "5432"
      DB_USER: lms_user
      DB_PASSWORD: "HashTurn@0900"
      DB_NAME: lms_db
      DB_SSL: "false"
    depends_on:
      lms-postgres:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"     # HTTP  (redirects to HTTPS)
      - "443:443"   # HTTPS (main entry point)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro          # SSL certs from Certbot
      - /var/www/certbot:/var/www/certbot:ro           # Cert renewal challenge
    depends_on:
      - lms-api

volumes:
  postgres_data:
    name: lms-postgres-data
    external: false
