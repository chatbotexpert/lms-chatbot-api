version: "3.9"

services:


  # ── FastAPI App ────────────────────────────────────────────────────────────
  # Port 8000 exposed to host so system Nginx can proxy to it
  lms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

