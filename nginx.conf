# Rate limiting — max 20 requests/min per IP on /api/ routes
limit_req_zone $binary_remote_addr zone=lms_api_limit:10m rate=20r/m;

server {
    server_name db.hashturn.net;

    # ── API routes — rate limited ──────────────────────────────────────────
    location /api/ {
        limit_req zone=lms_api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming (chat responses)
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
        proxy_connect_timeout     60s;
        proxy_send_timeout        300s;
        chunked_transfer_encoding on;
    }

    # ── Everything else (root, /docs, /redoc) ─────────────────────────────
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/db.hashturn.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db.hashturn.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = db.hashturn.net) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name db.hashturn.net;
    return 404;
}
