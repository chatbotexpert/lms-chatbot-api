# Rate limiting — max 20 requests/min per IP on /api/ routes
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;

# ── HTTP — Redirect to HTTPS + allow Let's Encrypt cert renewal ───────────────
server {
    listen 80;
    server_name db.hashturn.net;

    # Let's Encrypt renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name db.hashturn.net;

    # SSL certificates (generated by Certbot on your VPS)
    ssl_certificate     /etc/letsencrypt/live/db.hashturn.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db.hashturn.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── API routes — rate limited ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://lms-api:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE streaming (chat responses)
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
        chunked_transfer_encoding on;
    }

    # ── Everything else (root, /docs, /redoc) ─────────────────────────────
    location / {
        proxy_pass http://lms-api:8000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
